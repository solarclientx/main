<!DOCTYPE html>

        body { background:#020810; color:#D4DEFF; overflow:hidden; font-family:'Outfit',sans-serif; }

        .glass{ background:rgba(8,15,30,0.85); backdrop-filter:blur(20px); border:1px solid rgba(100,120,255,0.1); }
        .solar-text{ background:linear-gradient(135deg,#fff 0%,#A5C8FF 40%,#5EAEFF 70%,#B06EFF 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .nav-active{ background:linear-gradient(135deg,rgba(100,120,255,0.12),rgba(160,100,255,0.05)); border-left:2px solid #7C80FF; }
        .nav-btn:hover{ background:rgba(100,120,255,0.07); }
        .module-card{ transition:all 0.22s ease; }
        .module-card:hover{ border-color:rgba(100,120,255,0.3)!important; transform:translateY(-2px); }
        .module-enabled{ border-color:rgba(100,120,255,0.45)!important; background:linear-gradient(135deg,rgba(100,120,255,0.1),rgba(8,15,30,0.9))!important; box-shadow:0 0 20px rgba(100,120,255,0.1); }
        .module-enabled .m-icon{ background:rgba(100,120,255,0.2)!important; }
        .toggle{ position:relative;width:40px;height:22px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);border-radius:11px;cursor:pointer;transition:all 0.3s;flex-shrink:0; }
        .toggle.on{ background:linear-gradient(135deg,#6366F1,#A855F7);border-color:transparent; }
        .toggle::after{ content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;background:white;border-radius:50%;transition:all 0.3s;box-shadow:0 1px 4px rgba(0,0,0,0.3); }
        .toggle.on::after{ left:20px; }
        .tab{ display:none; } .tab.active{ display:block; }
        @keyframes fadeUp{ from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        .tab.active{ animation:fadeUp 0.3s ease; }
        @keyframes float{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
        .float{ animation:float 5s ease-in-out infinite; }
    </style>
</head>

function tagStyle(t) {

    if (t==='ECONOMY') return 'background:rgba(52,211,153,0.12);color:#34d399';

    Object.keys(modules).forEach(cat => {
        const g = document.getElementById(`${cat}-grid`);
        if (!g) return;
        g.innerHTML = modules[cat].map(m => `
            <div class="module-card glass rounded-xl p-4 cursor-pointer" style="border-color:rgba(100,120,255,0.09)" data-module="${m.id}">
                <div class="flex items-start justify-between mb-3">
                    <div class="m-icon p-2 rounded-lg" style="background:rgba(100,120,255,0.08);border:1px solid rgba(100,120,255,0.12)">
                        <svg class="w-4 h-4" style="color:#7C80FF" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                    </div>
                    <div class="toggle" data-toggle="${m.id}"></div>
                </div>
                <h3 class="font-semibold text-white text-sm mb-1">${m.name}</h3>
                <p class="text-xs mb-3" style="color:rgba(160,180,230,0.4);line-height:1.5">${m.desc}</p>
                <div class="flex gap-1.5 flex-wrap">
                    ${m.tags.map(t=>`<span class="px-2 py-0.5 text-xs rounded-md font-medium" style="${tagStyle(t)}">${t}</span>`).join('')}
                </div>
            </div>
        `).join('');
    });
}

const titles = {combat:'Combat Modules',crystal:'Crystal PvP Modules',mace:'Mace PvP Modules',render:'Render Modules',world:'World Modules',bases:'Base Finder Modules',automation:'Automation Modules'};

function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.getElementById(`tab-${tab}`)?.classList.add('active');
    document.querySelectorAll('.nav-btn').forEach(btn => {
        const on = btn.dataset.tab === tab;
        btn.classList.toggle('nav-active', on);
        const svg = btn.querySelector('svg');
        const txt = btn.querySelector('span:not(.ml-auto)');
        svg.style.color = on ? '#7C80FF' : '';
        txt.className = txt.className.replace(on?'text-gray-400':'text-white', on?'text-white':'text-gray-400');
    });
    document.getElementById('page-title').textContent = titles[tab] || 'Modules';
}

function toggleMod(id) {
    const card = document.querySelector(`[data-module="${id}"]`);
    const tog = document.querySelector(`[data-toggle="${id}"]`);
    if (active.has(id)) { active.delete(id); card?.classList.remove('module-enabled'); tog?.classList.remove('on'); }
    else { active.add(id); card?.classList.add('module-enabled'); tog?.classList.add('on'); }
    document.getElementById('active-count').textContent = `${active.size} ACTIVE`;
}

document.addEventListener('click', e => {
    const tog = e.target.closest('.toggle');
    if (tog) { e.stopPropagation(); toggleMod(tog.dataset.toggle); return; }
    const card = e.target.closest('.module-card');
    if (card) toggleMod(card.dataset.module);
});

document.querySelectorAll('.nav-btn').forEach(b => b.addEventListener('click', () => switchTab(b.dataset.tab)));

document.getElementById('search-input').addEventListener('input', e => {
    const q = e.target.value.toLowerCase();
    document.querySelectorAll('.module-card').forEach(c => {
        const match = !q || c.querySelector('h3').textContent.toLowerCase().includes(q) || c.querySelector('p').textContent.toLowerCase().includes(q);
        c.style.display = match ? '' : 'none';
    });
});

renderAll();
</script>
</body>
</html>
